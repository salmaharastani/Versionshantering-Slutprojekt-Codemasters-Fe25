<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codemasters - Contact</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- CSS SEKTION --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --form-bg: #f4f4f4;
            --accent-color: #007bff;
        }

        /* Mörkt läge färger */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f4f4f4;
            --form-bg: #2d2d2d;
            --accent-color: #3786d6;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
        }

        .form-container {
            background-color: var(--form-bg);
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Ser till att padding inte gör fältet för brett */
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        /* Pop-up (Dialog) styling */
        dialog {
            border: none;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.7);
        }

        /* Google Translate fix */
        #google_translate_element {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div id="google_translate_element"></div>
        
        <nav>
            <div class="link-container" id="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
        
        <h1 class="page-title">Codemasters Messageboard</h1>
        <button id="theme-toggle">Byt Tema</button>
    </header>

    <main>
        <section style="text-align: center;">
            <h2 id="contact-h2">Kontakta oss gärna om du har frågor eller vill lämna feedback.</h2>
        </section>

        <section>
            <div class="form-container">
                <form id="contactForm">
                    <label for="namn">Namn</label>
                    <input type="text" id="namn" name="name" required placeholder="Ditt namn..." value="Test-Erik">

                    <label for="mail">Mail</label>
                    <input type="email" name="mail" id="mail" required placeholder="Din Mail...">

                    <label for="meddelande">Meddelande</label>
                    <textarea name="meddelande" id="meddelande" required placeholder="Skriv här..." style="height: 150px;"></textarea>
                    
                    <button id="submitButton" type="submit">Skicka meddelande</button>
                </form>
            </div>
        </section>
    </main>

    <dialog id="statusModal">
        <h3>Tack!</h3>
        <p>Ditt meddelande har skickats till Codemasters.</p>
        <button id="closeModal">Stäng</button>
    </dialog>

    <script>
        // 1. Element-referenser
        const themeToggle = document.getElementById('theme-toggle');
        const contactForm = document.getElementById('contactForm');
        const statusModal = document.getElementById('statusModal');
        const closeModal = document.getElementById('closeModal');
        const body = document.body;

        // 2. Mörkt läge logik
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // 3. Formulär & Pop-up logik
        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();
            statusModal.showModal(); // Visar pop-upen
            contactForm.reset();     // Tömmer formuläret
        });

        closeModal.addEventListener('click', () => {
            statusModal.close();     // Stänger pop-upen
        });
    </script>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'sv'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
