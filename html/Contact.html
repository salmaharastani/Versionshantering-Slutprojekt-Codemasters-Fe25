<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codemasters</title>
</head>
<body>
    <header>
    <div>
        <h1 class="page-title">Codemasters Messageboard</h1>
        <button id="theme-toggle">Tema</button>
        <nav>
            <div class="link-container" id="nav-links">
                <a href="index.html">Home</a>
                <a href="About.html">About</a>
                <a href="Contact.html">Contact</a>

            </div>
        </nav>
    </header>
    <main>
        <section>
            <h2 id="contact-h2">Kontakta oss gärna om du har frågor eller vill lämna feedback. </h2>
        </section>
        <section>
            <div class="form-container">
                <form>
                    <label for="name">Namn</label>
                    <input type="text"
                    id="namn" name="name" required
                    placeholder="Ditt nman..."
                    />
                    <label for="mail">Mail</label>
                    <input type="email" name="mail" id="mail" 
                    required
                    placeholder="Din Mail...">



                    <label for="meddlande">Meddelande</label>
                    <textarea name="meddelande" id="meddelande" required
                     placeholder="Skriv här..." style="height: 200px;">

                    </textarea>
                    <button id="submitButton" type="submit">Skicka</button>
                </form>
            </div>
        </section>
    </main>


         <footer>
            <div class="socialbox">
                <p>Social Media</p>
                <a href="www.facebook.com">
                    <img class="socials-icon" src="../img/facebook.png" alt="Facebook Icon">

                </a>
                <a href="instagram.com">
                    <img  class="socials-icon"  src="../img/instagram.png" alt="Instagram Icon">
                </a>
                <a href="github.com">
                    <img class="socials-icon" src="../img/github.png" alt="Github Icon ">

                </a>
            </div>
            <p>Copyrights 2026, Codemasters</p>
        </footer>
    
    
</body>
</html>
